<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WildFang - AI Wildlife Streetwear</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:Arial, sans-serif;
      background:#0f0f0f;
      color:white;
    }

    header{
      padding:20px 60px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      background:#111;
      position:sticky;
      top:0;
    }

    .logo{
      font-size:28px;
      font-weight:bold;
      color:#f5c542;
    }

    nav a{
      color:white;
      text-decoration:none;
      margin-left:25px;
      transition:0.3s;
    }

    nav a:hover{
      color:#f5c542;
    }

    .hero{
      height:90vh;
      background:url('https://images.unsplash.com/photo-1546182990-dffeafbe841d?q=80&w=1600') center/cover;
      display:flex;
      justify-content:center;
      align-items:center;
      text-align:center;
      padding:20px;
    }

    .hero-content{
      background:rgba(0,0,0,0.6);
      padding:40px;
      border-radius:20px;
    }

    .hero h1{
      font-size:60px;
      margin-bottom:20px;
    }

    .hero p{
      font-size:20px;
      margin-bottom:30px;
      color:#ddd;
    }

    .btn{
      display:inline-block;
      padding:15px 35px;
      background:#f5c542;
      color:black;
      text-decoration:none;
      border-radius:50px;
      font-weight:bold;
      transition:0.3s;
    }

    .btn:hover{
      background:white;
    }

    .section{
      padding:80px 60px;
    }

    .section-title{
      font-size:40px;
      margin-bottom:50px;
      text-align:center;
      color:#f5c542;
    }

    .products{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
      gap:30px;
    }

    .product-card{
      background:#1a1a1a;
      border-radius:20px;
      overflow:hidden;
      transition:0.3s;
    }

    .product-card:hover{
      transform:translateY(-10px);
    }

    .product-card img{
      width:100%;
      height:350px;
      object-fit:cover;
    }

    .product-info{
      padding:20px;
    }

    .product-info h3{
      margin-bottom:10px;
    }

    .price{
      color:#f5c542;
      font-size:22px;
      margin-bottom:20px;
    }

    footer{
      text-align:center;
      padding:40px;
      background:#111;
      color:#888;
    }

    @media(max-width:768px){

      header{
        padding:20px;
        flex-direction:column;
      }

      nav{
        margin-top:15px;
      }

      .hero h1{
        font-size:40px;
      }

      .section{
        padding:60px 20px;
      }
    }

  </style>
</head>

<body>

  <header>
    <div class="logo">WildFang</div>

    <nav>
      <a href="#">Home</a>
      <a href="#">Shop</a>
      <a href="#">About</a>
      <a href="#">Contact</a>
    </nav>
  </header>

  <section class="hero">
    <div class="hero-content">
      <h1>AI Wildlife Streetwear</h1>
      <p>Cinematic Animal Designs Powered by AI</p>

      <a href="#" class="btn">Shop Now</a>
    </div>
  </section>

  <section class="section">

    <h2 class="section-title">Featured T-Shirts</h2>

    <div class="products">

      <div class="product-card">
        <img src="https://images.unsplash.com/photo-1517849845537-4d257902454a?q=80&w=1200">

        <div class="product-info">
          <h3>Snow Leopard Storm</h3>

          <div class="price">$29</div>

          <a href="#" class="btn">Buy Now</a>
        </div>
      </div>

      <div class="product-card">
        <img src="https://images.unsplash.com/photo-1474511320723-9a56873867b5?q=80&w=1200">

        <div class="product-info">
          <h3>Wild Predator</h3>

          <div class="price">$32</div>

          <a href="#" class="btn">Buy Now</a>
        </div>
      </div>

      <div class="product-card">
        <img src="https://images.unsplash.com/photo-1501706362039-c6e80948f11f?q=80&w=1200">

        <div class="product-info">
          <h3>Mountain Beast</h3>

          <div class="price">$35</div>

          <a href="#" class="btn">Buy Now</a>
        </div>
      </div>

    </div>

  </section>

  <footer>
    © 2026 WildFang — AI Wildlife Streetwear
  </footer>

</body>
</html>
